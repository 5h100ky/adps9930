; APDS-9930 + SSD1306 0.96" OLED on Waveshare RP2040 Zero
; ─────────────────────────────────────────────────────────────────────────────
; Build:         pio run
; Flash via UF2: hold BOOT, plug USB, copy
;                .pio/build/waveshare_rp2040_zero/firmware.uf2  to the RPI-RP2 drive
; Serial:        pio device monitor
; ─────────────────────────────────────────────────────────────────────────────

[env:waveshare_rp2040_zero]
platform  = raspberrypi
board     = waveshare_rp2040_zero
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306                  @ ^2.5.7
    adafruit/Adafruit GFX Library              @ ^1.11.9
    adafruit/Adafruit BusIO                    @ ^1.16.1
    https://github.com/Depau/APDS9930.git#d233667b4658d2d048c9abdcafa3d113c488e8ad

monitor_speed  = 115200
monitor_filters = direct

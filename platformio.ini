; APDS-9930 + ST7789 1.69" display on Pro Micro nRF52840
; ─────────────────────────────────────────────────────────────────────────────
; Build:  pio run
; Upload: pio run --target upload
; Serial: pio device monitor
; ─────────────────────────────────────────────────────────────────────────────

[env:sparkfun_pro_nrf52840mini]
platform  = nordicnrf52
board     = sparkfun_pro_nrf52840mini
framework = arduino

lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
    adafruit/Adafruit GFX Library              @ ^1.11.9
    adafruit/Adafruit BusIO                    @ ^1.16.1
    sparkfun/SparkFun APDS-9930 Ambient Light and Proximity Sensor @ ^1.0.0

monitor_speed  = 115200
monitor_filters = direct

build_flags =
    -DARDUINO_ARCH_NRF52

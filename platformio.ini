; APDS-9930 + ST7789 1.69" display on Raspberry Pi Pico (RP2040)
; ─────────────────────────────────────────────────────────────────────────────
; Build:         pio run
; Flash via UF2: hold BOOTSEL, plug USB, copy
;                .pio/build/pico/firmware.uf2  to the RPI-RP2 drive
; Serial:        pio device monitor
; ─────────────────────────────────────────────────────────────────────────────

[env:pico]
platform  = raspberrypi
board     = pico
framework = arduino

lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
    adafruit/Adafruit GFX Library              @ ^1.11.9
    adafruit/Adafruit BusIO                    @ ^1.16.1
    https://github.com/Depau/APDS9930.git#d233667b4658d2d048c9abdcafa3d113c488e8ad

monitor_speed  = 115200
monitor_filters = direct
